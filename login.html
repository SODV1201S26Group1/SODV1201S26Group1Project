<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        html {
            font-size: 100%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f0f0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9375rem 1.875rem;
            background-color: white;
            border-bottom: 0.0625rem solid #ddd;
        }

        nav h1 {
            font-size: 1.125rem;
            font-weight: bold;
            color: #5b5bd6;
        }

        nav a {
            text-decoration: none;
            color: white;
            background-color: #5b5bd6;
            padding: 0.5rem 1rem;
            border-radius: 0.3125rem;
        }

        .nav-links {
            display: flex;
            gap: 0.625rem;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 0.5rem;
            border: 0.0625rem solid #ddd;
            width: 100%;
            max-width: 28.125rem;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 0.625rem;
            font-size: 1.5rem;
            color: #5b5bd6;
        }

        .card p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 1.5625rem;
            font-size: 0.875rem;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.3125rem;
            font-size: 0.875rem;
            color: #5b5bd6;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.9375rem;
            border: 0.0625rem solid #ccc;
            border-radius: 0.3125rem;
            font-size: 0.875rem;
            color: #333;
        }

        input::placeholder {
            color: #aaa;
        }

        .password-field {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.9375rem;
        }

        .password-field input {
            margin-bottom: 0;
        }

        .password-toggle {
            flex: 0 0 auto;
            width: auto;
            padding: 0.5rem 0.75rem;
            border: 0.0625rem solid #5b5bd6;
            border-radius: 0.3125rem;
            background: white;
            color: #5b5bd6;
            font-size: 0.8125rem;
            cursor: pointer;
        }

        .password-toggle:hover {
            background: #f5f4ff;
        }

        .password-toggle:focus-visible {
            outline: 0.125rem solid #cfcdf8;
            outline-offset: 0.0625rem;
        }

        .password-toggle.form-button {
            margin: 0;
        }

        #message {
            background-color: #f0f0f0;
            padding: 0.625rem;
            border-radius: 0.3125rem;
            font-size: 0.875rem;
            color: #333;
            margin-bottom: 0.9375rem;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: #5b5bd6;
            color: white;
            border: none;
            border-radius: 0.3125rem;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background-color: #4a4ac4;
        }

        .register-link {
            text-align: center;
            margin-top: 0.9375rem;
            font-size: 0.875rem;
        }

        .register-link a {
            color: #5b5bd6;
            font-style: italic;
        }

        @media (max-width: 35rem) {
            nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.625rem;
                padding: 0.75rem 1rem;
            }

            .container {
                padding: 1rem;
                min-height: calc(100vh - 4rem);
            }

            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <h1>Shared Workspace App</h1>
        <div class="nav-links">
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Login</h2>
            <p class="subtitle">Sign in to continue.</p>

            <label>Email / Username</label>
            <input type="email" id="email" placeholder="Enter your email or username"/>

            <label>Password</label>
            <div class="password-field">
                <input type="password" id="password" placeholder="Enter your password"/>
                <button type="button" class="password-toggle form-button" id="togglePasswordBtn" onclick="togglePasswordVisibility('password', 'togglePasswordBtn')">Show</button>
            </div>

            <p id="message"></p>

            <button onclick="login()">Login</button>

            <div class="register-link">
                <p>No account? <a href="register.html">Register</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = localStorage.getItem('apiBaseUrl')
            || (window.location.hostname.endsWith('github.io')
                ? 'https://YOUR-RENDER-SERVICE.onrender.com'
                : '');

        function apiUrl(path) {
            return `${API_BASE_URL}${path}`;
        }

        function togglePasswordVisibility(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            button.textContent = show ? 'Hide' : 'Show';
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch(apiUrl('/login'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('role', data.role);
                localStorage.setItem('email', email);
                if (data.role === 'owner') {
                    window.location.href = 'my-properties.html';
                } else {
                    window.location.href = 'workspaces.html';
                }
            } else {
                document.getElementById('message').textContent = data.message;
            }
        }
    </script>
</body>
</html>
