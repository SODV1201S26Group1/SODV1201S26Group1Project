<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f0f0f0;
        }

        nav {
            padding: 15px 30px;
        }

        nav a {
            color: #5b5bd6;
            background-color: #fff;
            border: 1px solid #5b5bd6;
            border-radius: 5px;
            padding: 8px 16px;
        }

        nav a:hover {
            background: #f5f5ff;
        }

        .container {
            min-height: 90vh;
        }

        .card {
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .card p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        input {
            padding: 12px;
            margin-bottom: 15px;
        }

        .password-field {
            position: relative;
            margin-bottom: 15px;
        }

        .password-field input {
            margin-bottom: 0;
            padding-right: 72px;
        }

        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: auto;
            padding: 6px 10px;
            margin: 0;
            font-size: 12px;
            color: #5b5bd6;
            background: #fff;
            border: 1px solid #5b5bd6;
            border-radius: 5px;
        }

        .toggle-password:hover {
            background: #f5f5ff;
        }

        #message {
            background-color: #f0f0f0;
            padding: 10px;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }

        .primary-action {
            color: #fff;
            background-color: #5b5bd6;
            border: 1px solid #5b5bd6;
        }

        .primary-action:hover {
            background-color: #4a4ac4;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: #5b5bd6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <nav>
        <h1>Shared Workspace App</h1>
        <a href="register.html">Register</a>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Login</h2>
            <p class="subtitle">Sign in to continue.</p>

            <label>Email / Username</label>
            <input type="email" id="email" placeholder="Enter your email or username"/>

            <label>Password</label>
            <div class="password-field">
                <input type="password" id="password" placeholder="Enter your password"/>
                <button
                    type="button"
                    class="toggle-password"
                    id="toggleLoginPassword"
                    aria-label="Show password"
                >
                    Show
                </button>
            </div>

            <p id="message"></p>

            <button class="primary-action" onclick="login()">Login</button>

            <div class="register-link">
                <p>No account? <a href="register.html">Register</a></p>
            </div>
        </div>
    </div>

    <script>
        function setupPasswordToggle(toggleId, inputId) {
            const toggleButton = document.getElementById(toggleId);
            const input = document.getElementById(inputId);

            // Always start hidden with a Show control.
            input.type = 'password';
            toggleButton.textContent = 'Show';
            toggleButton.setAttribute('aria-label', 'Show password');

            toggleButton.addEventListener('click', () => {
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                toggleButton.textContent = isHidden ? 'Hide' : 'Show';
                toggleButton.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            });
        }

        setupPasswordToggle('toggleLoginPassword', 'password');

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('role', data.role);
                localStorage.setItem('email', email);
                if (data.role === 'owner') {
                    window.location.href = 'my-properties.html';
                } else {
                    window.location.href = 'workspaces.html';
                }
            } else {
                document.getElementById('message').textContent = data.message;
            }
        }
    </script>
</body>
</html>
