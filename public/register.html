<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f0f0f0;
        }

        nav {
            padding: 15px 30px;
        }

        nav a {
            color: #5b5bd6;
            background-color: #fff;
            border: 1px solid #5b5bd6;
            border-radius: 5px;
            padding: 8px 16px;
        }

        nav a:hover {
            background: #f5f5ff;
        }

        .container {
            min-height: 90vh;
        }

        .card {
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        input, select {
            padding: 12px;
            margin-bottom: 15px;
        }

        .password-field {
            position: relative;
            margin-bottom: 15px;
        }

        .password-field input {
            margin-bottom: 0;
            padding-right: 72px;
        }

        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: auto;
            padding: 6px 10px;
            margin: 0;
            font-size: 12px;
            color: #5b5bd6;
            background: #fff;
            border: 1px solid #5b5bd6;
            border-radius: 5px;
        }

        .toggle-password:hover {
            background: #f5f5ff;
        }

        .password-note {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 5px;
        }

        .primary-action {
            color: #fff;
            background-color: #5b5bd6;
            border: 1px solid #5b5bd6;
        }

        .primary-action:hover {
            background-color: #4a4ac4;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            color: #5b5bd6;
            font-style: italic;
        }

        #message {
            text-align: center;
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <h1>Shared Workspace App</h1>
        <a href="login.html">Login</a>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Create Account</h2>

            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name"/>

            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter your phone number"/>

            <label>Email / Username</label>
            <input type="email" id="email" placeholder="Enter your email or username"/>

            <label>Password</label>
            <div class="password-field">
                <input type="password" id="password" placeholder="Enter your password"/>
                <button
                    type="button"
                    class="toggle-password"
                    id="toggleRegisterPassword"
                    aria-label="Show password"
                >
                    Show
                </button>
            </div>
            <p class="password-note">
                Password must be at least 8 characters and include 1 uppercase letter,
                1 lowercase letter, 1 number, and 1 special character.
            </p>

            <label>Confirm Password</label>
            <div class="password-field">
                <input type="password" id="confirmPassword" placeholder="Re-enter your password"/>
                <button
                    type="button"
                    class="toggle-password"
                    id="toggleConfirmPassword"
                    aria-label="Show confirm password"
                >
                    Show
                </button>
            </div>

            <label>Role</label>
            <select id="role">
                <option value="">Select role: Owner / Coworker</option>
                <option value="owner">Owner</option>
                <option value="coworker">Coworker</option>
            </select>

            <button class="primary-action" onclick="register()">Register</button>
            <p id="message"></p>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d\s]).{8,}$/;

        function setupPasswordToggle(toggleId, inputId) {
            const toggleButton = document.getElementById(toggleId);
            const input = document.getElementById(inputId);

            // Always start hidden with a Show control.
            input.type = 'password';
            toggleButton.textContent = 'Show';
            toggleButton.setAttribute('aria-label', 'Show password');

            toggleButton.addEventListener('click', () => {
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                toggleButton.textContent = isHidden ? 'Hide' : 'Show';
                toggleButton.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            });
        }

        setupPasswordToggle('toggleRegisterPassword', 'password');
        setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

        async function register() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;

            if (password !== confirmPassword) {
                document.getElementById('message').textContent = 'Passwords do not match!';
                return;
            }

            if (!passwordPattern.test(password)) {
                document.getElementById('message').textContent = 'Password must be at least 8 characters and include uppercase, lowercase, number, and special character.';
                return;
            }

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, email, password, role })
            });
            const data = await res.json();
            document.getElementById('message').textContent = data.message;

            if (data.success) {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
