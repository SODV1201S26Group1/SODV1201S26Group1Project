<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        html {
            font-size: 100%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f0f0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9375rem 1.875rem;
            background-color: white;
            border-bottom: 0.0625rem solid #ddd;
        }

        nav h1 {
            font-size: 1.125rem;
            font-weight: bold;
            color: #5b5bd6;
        }

        nav a {
            text-decoration: none;
            color: #5b5bd6;
            border: 0.0625rem solid #5b5bd6;
            padding: 0.5rem 1rem;
            border-radius: 0.3125rem;
        }

        .nav-links {
            display: flex;
            gap: 0.625rem;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 0.5rem;
            border: 0.0625rem solid #ddd;
            width: 100%;
            max-width: 28.125rem;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 1.5625rem;
            font-size: 1.5rem;
            color: #5b5bd6;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.3125rem;
            font-size: 0.875rem;
            color: #5b5bd6;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.9375rem;
            border: 0.0625rem solid #ccc;
            border-radius: 0.3125rem;
            font-size: 0.875rem;
            color: #333;
        }

        input::placeholder {
            color: #aaa;
        }

        .password-field {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.9375rem;
        }

        .password-field input {
            margin-bottom: 0;
        }

        .password-toggle {
            flex: 0 0 auto;
            width: auto;
            padding: 0.5rem 0.75rem;
            border: 0.0625rem solid #5b5bd6;
            border-radius: 0.3125rem;
            background: white;
            color: #5b5bd6;
            font-size: 0.8125rem;
            cursor: pointer;
        }

        .password-toggle:hover {
            background: #f5f4ff;
        }

        .password-toggle:focus-visible {
            outline: 0.125rem solid #cfcdf8;
            outline-offset: 0.0625rem;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: #5b5bd6;
            color: white;
            border: none;
            border-radius: 0.3125rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.3125rem;
        }

        button:hover {
            background-color: #4a4ac4;
        }

        .login-link {
            text-align: center;
            margin-top: 0.9375rem;
            font-size: 0.875rem;
        }

        .login-link a {
            color: #5b5bd6;
            font-style: italic;
        }

        #message {
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }

        .success-message {
            color: green;
        }

        .error-message {
            color: red;
        }

        @media (max-width: 35rem) {
            nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.625rem;
                padding: 0.75rem 1rem;
            }

            .container {
                padding: 1rem;
                min-height: calc(100vh - 4rem);
            }

            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <nav>
        <h1>Shared Workspace App</h1>
        <div class="nav-links">
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Create Account</h2>

            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" />

            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter your phone number" />

            <label>Email / Username</label>
            <input type="email" id="email" placeholder="Enter your email or username" />

            <label>Password</label>
            <div class="password-field">
                <input type="password" id="password" placeholder="Enter your password" />
                <button type="button" class="password-toggle" id="togglePasswordBtn"
                    onclick="togglePasswordVisibility('password', 'togglePasswordBtn')">Show</button>
            </div>

            <label>Confirm Password</label>
            <div class="password-field">
                <input type="password" id="confirmPassword" placeholder="Re-enter your password" />
                <button type="button" class="password-toggle" id="toggleConfirmPasswordBtn"
                    onclick="togglePasswordVisibility('confirmPassword', 'toggleConfirmPasswordBtn')">Show</button>
            </div>

            <label>Role</label>
            <select id="role">
                <option value="">Select role: Owner / Coworker</option>
                <option value="owner">Owner</option>
                <option value="coworker">Coworker</option>
            </select>

            <button onclick="register()">Register</button>
            <p id="message"></p>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            button.textContent = show ? 'Hide' : 'Show';
        }

        async function register() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const message = document.getElementById('message');

            if (password !== confirmPassword) {
                message.className = 'error-message';
                message.textContent = 'Passwords do not match!';
                return;
            }

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, email, password, role })
            });
            const data = await res.json();

            if (data.success) {
                message.className = 'success-message';
                message.textContent = data.message;

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 800);
            } else {
                message.className = 'error-message';
                message.textContent = data.message;
            }
        }
    </script>
</body>

</html>
